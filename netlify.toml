[build]
  command   = "cargo build --release && ./target/release/folio build"
  publish   = "dist"
 
[build.environment]
  RUST_VERSION = "stable"
 
# Cache cargo registry and build artifacts between deploys
# This cuts rebuild time from ~60s to ~5s on unchanged dependencies
[[plugins]]
  package = "@netlify/plugin-caching"
 
  [plugins.inputs]
    paths = [
      ".cargo",
      "target",
    ]
 
